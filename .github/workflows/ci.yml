name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Install dependencies
        run: uv sync --extra dev
      - name: Run non-torch tests
        run: uv run pytest tests/test_synthetic.py tests/test_data.py tests/test_loss.py tests/test_metrics.py -v --tb=short
      - name: Run torch tests
        run: uv run pytest tests/test_models.py tests/test_bootstrap.py -v --tb=short
